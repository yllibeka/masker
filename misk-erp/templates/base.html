<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}MISK ERP{% endblock %}</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { font-family: 'DM Sans', sans-serif; }
  .mono { font-family: 'DM Mono', monospace; }

  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #212127;
    --border: #2a2a32;
    --text: #f0f0f4;
    --muted: #7a7a8c;
    --accent: #7c6aff;
    --accent-soft: rgba(124,106,255,0.12);
    --green: #22c55e;
    --red: #ef4444;
    --amber: #f59e0b;
  }

  body { background: var(--bg); color: var(--text); min-height: 100vh; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    padding: 12px 24px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 15px;
    transition: opacity 0.15s, transform 0.1s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: none;
    cursor: pointer;
  }
  .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    padding: 10px 18px;
    border-radius: 10px;
    font-weight: 500;
    transition: background 0.15s, color 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    text-decoration: none;
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }

  .btn-danger {
    background: rgba(239,68,68,0.15);
    color: var(--red);
    padding: 10px 18px;
    border-radius: 10px;
    font-weight: 500;
    border: 1px solid rgba(239,68,68,0.3);
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-danger:hover { background: rgba(239,68,68,0.25); }

  .input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 15px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }
  .input:focus { border-color: var(--accent); }
  .input::placeholder { color: var(--muted); }

  select.input { cursor: pointer; }

  .label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    display: block;
  }

  .nav-link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 10px;
    color: var(--muted);
    font-weight: 500;
    font-size: 14px;
    transition: background 0.15s, color 0.15s;
    text-decoration: none;
  }
  .nav-link:hover { background: var(--surface2); color: var(--text); }
  .nav-link.active { background: var(--accent-soft); color: var(--accent); }

  .badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 100px;
    display: inline-block;
  }

  .status-u-mor { background: rgba(245,158,11,0.15); color: var(--amber); }
  .status-matje { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .status-larje { background: rgba(6,182,212,0.15); color: #22d3ee; }
  .status-tharje { background: rgba(168,85,247,0.15); color: #c084fc; }
  .status-paketim { background: rgba(236,72,153,0.15); color: #f472b6; }
  .status-gati { background: rgba(34,197,94,0.15); color: var(--green); }

  .flash-msg {
    padding: 14px 20px;
    border-radius: 12px;
    font-weight: 500;
    margin-bottom: 20px;
    border: 1px solid;
  }
  .flash-success { background: rgba(34,197,94,0.1); color: var(--green); border-color: rgba(34,197,94,0.3); }
  .flash-error { background: rgba(239,68,68,0.1); color: var(--red); border-color: rgba(239,68,68,0.3); }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }

  .sidebar { 
    width: 240px; 
    min-height: 100vh; 
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    position: fixed;
    top: 0; left: 0;
    display: flex;
    flex-direction: column;
    z-index: 100;
  }

  .main-content { margin-left: 240px; padding: 32px; min-height: 100vh; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main-content { margin-left: 0; padding: 16px; }
    .mobile-nav { display: flex !important; }
  }

  .mobile-nav {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 8px;
    gap: 4px;
    z-index: 200;
  }

  .mobile-nav a {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 4px;
    border-radius: 10px;
    color: var(--muted);
    font-size: 10px;
    text-decoration: none;
    transition: color 0.15s;
  }
  .mobile-nav a.active { color: var(--accent); }

  .table-row {
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
  }
  .table-row:hover { background: var(--surface2); }
  .table-row:last-child { border-bottom: none; }

  .kanban-col {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    min-width: 200px;
    flex: 1;
  }

  .divider { border-color: var(--border); }
</style>
</head>
<body>
<!-- Sidebar -->
<aside class="sidebar">
  <div class="mb-8">
    <div style="font-size:22px;font-weight:700;letter-spacing:-0.5px;">MISK<span style="color:var(--accent)">.</span></div>
    <div style="font-size:11px;color:var(--muted);margin-top:2px;">ERP System</div>
  </div>

  <nav style="flex:1;display:flex;flex-direction:column;gap:4px;">
    <a href="{{ url_for('dashboard') }}" class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>
    <a href="{{ url_for('klientet') }}" class="nav-link {% if 'klient' in request.endpoint %}active{% endif %}">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      Klientët
    </a>
    <a href="{{ url_for('porositë') }}" class="nav-link {% if 'porosi' in request.endpoint %}active{% endif %}">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Porositë
    </a>

    <div style="height:1px;background:var(--border);margin:12px 0;"></div>
    <div style="font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);padding:0 14px;margin-bottom:4px;">Modulet</div>

    <a href="{{ url_for('fabrika') }}" class="nav-link {% if request.endpoint == 'fabrika' %}active{% endif %}">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M2 20a2 2 0 002 2h16a2 2 0 002-2V8l-7-7H4a2 2 0 00-2 2v17z"/><path d="M14 2v6h6"/></svg>
      Fabrika
    </a>
    <a href="{{ url_for('stoku') }}" class="nav-link {% if request.endpoint == 'stoku' %}active{% endif %}">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
      Stoku
    </a>
    <a href="{{ url_for('shpenzimet') }}" class="nav-link {% if request.endpoint == 'shpenzimet' %}active{% endif %}">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      Shpenzimet
    </a>
    <a href="{{ url_for('financat') }}" class="nav-link {% if request.endpoint == 'financat' %}active{% endif %}">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Financat
    </a>
  </nav>

  <div style="padding-top:16px;border-top:1px solid var(--border);">
    <a href="{{ url_for('logout') }}" class="nav-link" style="color:var(--red);">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Dil
    </a>
  </div>
</aside>

<!-- Mobile Nav -->
<nav class="mobile-nav">
  <a href="{{ url_for('dashboard') }}" class="{% if request.endpoint == 'dashboard' %}active{% endif %}">
    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Hyrja
  </a>
  <a href="{{ url_for('klientet') }}" class="{% if 'klient' in request.endpoint %}active{% endif %}">
    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
    Klientët
  </a>
  <a href="{{ url_for('porositë') }}" class="{% if 'porosi' in request.endpoint %}active{% endif %}">
    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg>
    Porositë
  </a>
  <a href="{{ url_for('fabrika') }}" class="{% if request.endpoint == 'fabrika' %}active{% endif %}">
    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M2 20a2 2 0 002 2h16a2 2 0 002-2V8l-7-7H4a2 2 0 00-2 2v17z"/></svg>
    Fabrika
  </a>
  <a href="{{ url_for('financat') }}" class="{% if request.endpoint == 'financat' %}active{% endif %}">
    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Financa
  </a>
</nav>

<main class="main-content" style="padding-bottom: 80px;">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash-msg flash-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
